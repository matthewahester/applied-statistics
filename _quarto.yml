# Applied Statistical Methods — public Quarto course site (assembled course materials).
# Sibling of matthewhester.com; intended to live at /applied-statistics/ under that domain.
# Layout/theme aligned to the matthewhester.com course family (cosmo + styles.css, dark navbar,
# floating sidebar, right-side TOC, MathML math). site-url set for the combined deploy; this repo
# does not self-deploy (no CI here — the hub workflow assembles the courses).
project:
  type: website
  output-dir: _site
  # RENDER ALLOW-LIST (docs/08 §2 boundary hazard; docs/26 §6). Fails safe — only the public sections below
  # render into _site/. Every private dir (_state/ underscore-skipped, plus source_text/, assessment_shadow/,
  # run_reports/, accessibility/) is excluded.
  # NOTE: a bare "*.qmd" matches RECURSIVELY in Quarto 1.8.26 and could leak nested private .qmd. List the three
  # public root pages explicitly instead, and negate private dirs as belt-and-suspenders (docs/08 §2, docs/26 §6).
  render:
    - index.qmd
    - syllabus.qmd
    - schedule.qmd
    - notes/*.qmd
    - labs/*.qmd
    - resources/*.qmd
    - "!_state/"
    - "!source_text/"
    - "!assessment_shadow/"
    - "!run_reports/"
    - "!accessibility/"

website:
  title: "Applied Statistical Methods"
  site-url: https://matthewhester.com/applied-statistics/
  description: |
    Public-facing course materials for Applied Statistical Methods —
    an assembled course site (notes, labs, and resources) curated by Matt Hester.
  open-graph: true
  navbar:
    pinned: true
    background: dark            # black top bar — the family signature
    logo: assets/icon.png
    logo-alt: "Applied Statistical Methods — a pink-and-green watermelon-tourmaline course mark"
    left:
      - href: index.qmd
        text: Home
      - href: syllabus.qmd
        text: Syllabus
      - href: schedule.qmd
        text: Schedule
  sidebar:
    style: floating
    collapse-level: 2
    contents:
      - section: "Notes"
        href: notes/index.qmd
        contents:
          - href: notes/index.qmd
            text: "Notes overview"
          - section: "Part I — Question, structure & estimation (Wk 1–3)"
            contents:
              - href: notes/week-01-statistical-questions-and-data-structure.qmd
                text: "1 — Statistical questions & data structure"
              - href: notes/week-02-exploratory-analysis-and-graphical-comparison.qmd
                text: "2 — Exploratory analysis & graphical comparison"
              - href: notes/week-03-estimation-uncertainty-and-practical-significance.qmd
                text: "3 — Estimation, uncertainty & practical significance"
          - section: "Part II — Comparing groups (Wk 4–9)"
            contents:
              - href: notes/week-04-one-sample-and-paired-comparisons.qmd
                text: "4 — One-sample & paired comparisons"
              - href: notes/week-05-two-group-comparisons.qmd
                text: "5 — Two-group comparisons"
              - href: notes/week-06-many-group-comparisons-and-one-way-anova.qmd
                text: "6 — Many-group comparisons & one-way ANOVA"
              - href: notes/week-07-assumptions-diagnostics-and-the-midterm.qmd
                text: "7 — Assumptions, diagnostics & midterm"
              - href: notes/week-08-multiple-comparisons-and-planned-contrasts.qmd
                text: "8 — Multiple comparisons & planned contrasts"
              - href: notes/week-09-two-way-anova-and-interaction.qmd
                text: "9 — Two-way ANOVA & interaction"
          - section: "Part III — Models, covariates & categorical outcomes (Wk 10–13)"
            contents:
              - href: notes/week-10-simple-and-multiple-regression-review.qmd
                text: "10 — Simple & multiple regression review"
              - href: notes/week-11-ancova-and-adjustment.qmd
                text: "11 — ANCOVA & adjustment"
              - href: notes/week-12-categorical-outcomes-and-contingency-tables.qmd
                text: "12 — Categorical outcomes & contingency tables"
              - href: notes/week-13-logistic-regression-for-binary-outcomes.qmd
                text: "13 — Logistic regression for binary outcomes"
          - section: "Part IV — Reporting & synthesis (Wk 14–15)"
            contents:
              - href: notes/week-14-applied-analysis-report-workshop.qmd
                text: "14 — Applied analysis report workshop"
              - href: notes/week-15-applied-methods-synthesis-and-review.qmd
                text: "15 — Applied methods synthesis & review"
      - section: "Labs"
        href: labs/index.qmd
        contents:
          - href: labs/index.qmd
            text: "Labs overview"
          - href: labs/lab-05-two-group-comparison-and-effect-size.qmd
            text: "Lab 5 — Two-group comparison & effect size"
          - href: labs/lab-08-anova-with-multiple-comparisons.qmd
            text: "Lab 8 — ANOVA with multiple comparisons"
          - href: labs/lab-10-building-and-checking-a-regression.qmd
            text: "Lab 10 — Building & checking a regression"
          - href: labs/lab-13-logistic-regression-and-odds-ratios.qmd
            text: "Lab 13 — Logistic regression & odds ratios"
      - section: "Resources"
        href: resources/index.qmd
        contents:
          - href: resources/index.qmd
            text: "Resources overview"
          - href: resources/methods-glossary.qmd
            text: "Methods glossary"
          - href: resources/method-chooser.qmd
            text: "Method chooser (decision guide)"
          - href: resources/assumptions-and-diagnostics-guide.qmd
            text: "Assumptions & diagnostics guide"
          - href: resources/reporting-and-interpretation-guide.qmd
            text: "Reporting & interpretation guide"
  page-footer:
    left: "© 2026 Matt Hester · Applied Statistical Methods"
    center: "[Matt Hester · matthewhester.com](https://matthewhester.com/)"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-location: right
    anchor-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    fontsize: 1.05em
    mainfont: "Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
    monofont: "JetBrains Mono, Consolas, Menlo, monospace"
# Math renders as MathML/MathJax (accessible text), never as images (docs/05 P7; docs/08 §4).
# R is shown as static, non-executed ```r fences here, so render is deterministic and R-free.
